name: Security checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - name: Reject tracked recordings and private keys
        shell: bash
        run: |
          if git ls-files | grep -E '\.(mp4|webm|pem|p12|pfx)$|(^|/)\.env($|\.)'; then
            echo "Sensitive or generated files must not be tracked."
            exit 1
          fi

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
